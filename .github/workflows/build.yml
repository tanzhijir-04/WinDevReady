name: Build

  on:
    push:
      branches: [main]
    workflow_dispatch:

  jobs:
    build:
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-go@v5
          with:
            go-version: "1.23"
        - run: go mod download
        - run: go build -o WinDevReady.exe .
        - uses: actions/upload-artifact@v4
          with:
            name: WinDevReady-windows-amd64
            path: WinDevReady.exe
