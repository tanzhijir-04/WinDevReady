<svg id="app-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
                <defs>
                    <!-- 深色圆角底板渐变 -->
                    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1E293B"/>
                        <stop offset="100%" stop-color="#020617"/>
                    </linearGradient>
                    
                    <!-- Windows 蓝色渐变 -->
                    <linearGradient id="win-blue" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#38BDF8"/>
                        <stop offset="100%" stop-color="#0078D4"/>
                    </linearGradient>

                    <!-- AI 紫色/Go青色渐变 -->
                    <linearGradient id="ai-magic" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00ADD8"/> <!-- Go Cyan -->
                        <stop offset="100%" stop-color="#8B5CF6"/> <!-- Purple -->
                    </linearGradient>

                    <!-- Ready 绿色光泽 -->
                    <linearGradient id="ready-green" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#34D399"/>
                        <stop offset="100%" stop-color="#10B981"/>
                    </linearGradient>

                    <!-- 柔光发光效果滤镜 -->
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="8" result="blur"/>
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                </defs>

                <!-- 1. 基础 App 圆角图标底板 -->
                <rect width="512" height="512" rx="115" fill="url(#bg-grad)"/>

                <!-- 2. 内部终端窗口容器 -->
                <!-- stroke 模拟窗口边框，fill 模拟窗口深色背景 -->
                <rect x="64" y="104" width="384" height="304" rx="20" fill="#0F172A" stroke="#334155" stroke-width="8"/>
                
                <!-- 顶栏分割线 -->
                <path d="M 64 160 L 448 160" stroke="#334155" stroke-width="8"/>

                <!-- 3. 左上角微缩的 Windows Logo (代替 macOS 的红黄绿三点) -->
                <!-- 四个方块阵列 -->
                <rect x="92" y="122" width="10" height="10" rx="1.5" fill="#0078D4"/>
                <rect x="106" y="122" width="10" height="10" rx="1.5" fill="#0078D4"/>
                <rect x="92" y="136" width="10" height="10" rx="1.5" fill="#0078D4"/>
                <rect x="106" y="136" width="10" height="10" rx="1.5" fill="#0078D4"/>

                <!-- 4. 终端提示符 `>` -->
                <path d="M 120 220 L 190 270 L 120 320" fill="none" stroke="url(#win-blue)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

                <!-- 5. 终端就绪指示符 `_` -->
                <path d="M 216 320 L 296 320" fill="none" stroke="url(#ready-green)" stroke-width="32" stroke-linecap="round" filter="url(#glow)"/>

                <!-- 6. AI 闪耀星芒 ✨ (主星) -->
                <path d="M 380 180 Q 380 250 310 250 Q 380 250 380 320 Q 380 250 450 250 Q 380 250 380 180 Z" fill="url(#ai-magic)" filter="url(#glow)"/>
                
                <!-- 7. AI 闪耀星芒 ✨ (副星) -->
                <path d="M 430 160 Q 430 185 405 185 Q 430 185 430 210 Q 430 185 455 185 Q 430 185 430 160 Z" fill="#38BDF8"/>
            </svg>